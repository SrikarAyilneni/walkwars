services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: walkwars
      POSTGRES_USER: walkwars
      POSTGRES_PASSWORD: walkwars
    ports:
      - "5433:5432"
    volumes:
      - walkwars_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walkwars -d walkwars"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/walkwars
      SPRING_DATASOURCE_USERNAME: walkwars
      SPRING_DATASOURCE_PASSWORD: walkwars
      WALKWARS_CORS_ALLOWED_ORIGINS: "http://localhost:5173,https://*.ngrok-free.app,https://*.ngrok-free.dev,https://*.ngrok.io,http://192.168.*"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      NGROK_AUTHTOKEN: "3FxSSaJOQ7O817vSeoi96Y34paL_5tEmw3ck2dt2fd3zATNZR"
    command:
      - "http"
      - "frontend:5173"
      - "--url=unbitten-greasily-unwound.ngrok-free.dev"
    depends_on:
      - frontend


volumes:
  walkwars_pgdata:
