services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: walkwars
      POSTGRES_USER: walkwars
      POSTGRES_PASSWORD: walkwars
    ports:
      - "5432:5432"
    volumes:
      - walkwars_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walkwars -d walkwars"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  walkwars_pgdata:
