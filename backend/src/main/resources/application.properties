spring.application.name=walkwars
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/walkwars
spring.datasource.username=walkwars
spring.datasource.password=walkwars

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

walkwars.jwt.secret=walkwars-dev-secret-change-in-production-min-32-chars
walkwars.jwt.expiration-ms=86400000

walkwars.cors.allowed-origins=http://localhost:5173,https://*.ngrok-free.app,https://*.ngrok-free.dev,https://*.ngrok.io,http://192.168.*

walkwars.walk.min-points=2
walkwars.walk.min-distance-meters=10
walkwars.walk.closure-radius-meters=25
walkwars.walk.min-perimeter-meters=100
