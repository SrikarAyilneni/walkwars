server {
    listen 80;
    server_name freelogic.in www.freelogic.in;

    # 1. Main Landing / Portfolio Page
    location / {
        root /var/www/freelogic;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # 2. Redirect /walkwars requests to walkwars.in
    location /walkwars {
        rewrite ^/walkwars(?:/(.*))?$ https://walkwars.in/$1 permanent;
    }

    # 3. WalkWars Backend Spring Boot Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
